# Server Configuration
server.port=8080
server.servlet.context-path=/

# Spring Application Name
spring.application.name=loanpro-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/loanpro_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# Run data.sql AFTER Hibernate creates the tables, and run it for non-embedded
# databases (PostgreSQL) too — otherwise the seed accounts are never inserted.
# data.sql uses "ON CONFLICT DO NOTHING", so re-running on each boot is safe.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuration
# Base64-encoded 256-bit (32-byte) secret. JwtService Base64-decodes this before
# signing tokens with HS256. Generate a new one with: openssl rand -base64 32
app.jwt.secret=Jf0sRHhlXbkga4Ugt5fX2pKrCn9K41MjPFtMg1YTId4=
app.jwt.expiration-ms=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging Configuration
logging.level.root=INFO
logging.level.com.loanpro=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
