# ===========================================================================
# "h2" profile — in-memory database for local verification / quick demos.
#
#   Run with:  mvn spring-boot:run "-Dspring-boot.run.profiles=h2"
#
# Everything here overrides the PostgreSQL settings in application.properties.
# No external database is required. Data is reset on every restart.
# ===========================================================================

# H2 in-memory datasource (PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:loanpro;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate the schema from the JPA entities on every boot.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Seed from the H2-compatible script instead of data.sql (which uses
# PostgreSQL-specific "ON CONFLICT"). Seeds admin@loanpro.com / nimal@gmail.com.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-h2.sql
spring.sql.init.continue-on-error=true

# Browse the in-memory DB at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:loanpro , user: sa , no password)
spring.h2.console.enabled=true
